# GitHub Pages Jekyll 配置
title: 每日新闻洞察报告
description: 专业的每日新闻深度分析报告，涵盖国内外高影响力新闻及A股市场关联分析
theme: jekyll-theme-cayman

# 基本配置
url: "https://boya357.github.io" # 你的GitHub Pages URL
baseurl: "/daily-news-insight" # 仓库名称

# 构建选项
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# 插件
plugins:
  - jekyll-sitemap
  - jekyll-feed

# 排除文件
exclude:
  - README.md
  - LICENSE
  - .gitignore
  - .github/

# 自定义集合
collections:
  reports:
    output: true
    permalink: /:path/

# 默认值
defaults:
  - scope:
      path: "docs"
      type: "pages"
    values:
      layout: "default"
      permalink: /:path/

# 显示配置
show_downloads: false
github:
  is_project_page: true
  repository_url: https://github.com/boya357/daily-news-insight